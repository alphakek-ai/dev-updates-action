name: 'Dev Updates'
description: 'AI-powered dev update notifications with privacy modes and multi-channel dispatch'
author: 'alphakek-ai'

branding:
  icon: 'send'
  color: 'purple'

inputs:
  channels:
    description: 'YAML list of channel configurations'
    required: true
  public_rules:
    description: 'Instructions for public summaries'
    required: false
    default: |
      Describe changes in terms of user-facing impact only.
      Do not mention file paths, function names, class names, or internal architecture.
      Do not mention specific technologies, databases, or infrastructure details.
      Write as if announcing to end users who do not know the codebase.
  private_rules:
    description: 'Instructions for private summaries'
    required: false
    default: |
      Include technical details: file paths, function names, what specifically changed and why.
      Be precise and specific. This is for the dev team.
  title_style:
    description: 'Style for the update title'
    required: false
    default: 'catchy, under 40 chars'
  max_bullets:
    description: 'Maximum number of bullet points per summary'
    required: false
    default: '5'

runs:
  using: 'composite'
  steps:
    - name: Get commit range
      id: range
      shell: bash
      run: |
        BEFORE="${{ github.event.before }}"
        AFTER="${{ github.event.after }}"
        if [[ "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
          BEFORE="${AFTER}~1"
        fi
        echo "before=${BEFORE}" >> "$GITHUB_OUTPUT"
        echo "after=${AFTER}" >> "$GITHUB_OUTPUT"
        echo "commit_count=$(git rev-list --count "${BEFORE}..${AFTER}" 2>/dev/null || echo 1)" >> "$GITHUB_OUTPUT"
        echo "files_changed=$(git diff --name-only "${BEFORE}" "${AFTER}" 2>/dev/null | wc -l || echo 0)" >> "$GITHUB_OUTPUT"

    - name: Detect required modes
      id: modes
      shell: bash
      run: |
        CHANNELS='${{ inputs.channels }}'
        HAS_PRIVATE=$(echo "$CHANNELS" | grep -c 'mode:.*private' || true)
        HAS_PUBLIC=$(echo "$CHANNELS" | grep -c 'mode:.*public' || true)
        echo "has_private=$([[ $HAS_PRIVATE -gt 0 ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
        echo "has_public=$([[ $HAS_PUBLIC -gt 0 ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"

    - name: Check required secrets
      shell: bash
      run: |
        if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
          echo "::error::CLAUDE_CODE_OAUTH_TOKEN is not set. Add it as a repository secret."
          exit 1
        fi

    - name: Generate summaries
      shell: bash
      env:
        HAS_PRIVATE: ${{ steps.modes.outputs.has_private }}
        HAS_PUBLIC: ${{ steps.modes.outputs.has_public }}
      run: |
        BEFORE="${{ steps.range.outputs.before }}"
        AFTER="${{ steps.range.outputs.after }}"

        # Build the prompt based on which modes are needed
        TASK=""
        if [[ "$HAS_PRIVATE" == "true" && "$HAS_PUBLIC" == "true" ]]; then
          TASK="Write TWO summaries and save them using the Write tool:

        1. Write /tmp/summary_private.md — a PRIVATE (technical) summary:
        ${{ inputs.private_rules }}

        2. Write /tmp/summary_public.md — a PUBLIC (user-facing) summary:
        ${{ inputs.public_rules }}"
        elif [[ "$HAS_PRIVATE" == "true" ]]; then
          TASK="Write a PRIVATE (technical) summary and save it using the Write tool to /tmp/summary_private.md.
        ${{ inputs.private_rules }}"
        else
          TASK="Write a PUBLIC (user-facing) summary and save it using the Write tool to /tmp/summary_public.md.
        ${{ inputs.public_rules }}"
        fi

        npx -y @anthropic-ai/claude-code --allowedTools "Read,Write,Bash(git *)" -p "
        You have access to a git repo. The commit range for this push is ${BEFORE}..${AFTER}.

        1. Read the README (or any top-level docs) to understand what this project is.
        2. Use git log, git diff, and any other tools to understand what changed.
        3. ${TASK}

        Each summary file should be a complete, well-formatted markdown message ready to send.
        Include a bold title, then bullet points summarizing the changes (max ${{ inputs.max_bullets }} bullets).
        Use markdown formatting naturally (bold, backticks, etc).
        Keep it concise — each bullet should be one line with an emoji prefix.

        IMPORTANT: Use the Write tool to write each file. Do not output the summaries to stdout.
        " --max-turns 15 2>/dev/null

        # Verify outputs
        FAILED=false
        if [[ "$HAS_PRIVATE" == "true" && ! -s /tmp/summary_private.md ]]; then
          echo "::error::Claude Code did not produce private summary"
          FAILED=true
        fi
        if [[ "$HAS_PUBLIC" == "true" && ! -s /tmp/summary_public.md ]]; then
          echo "::error::Claude Code did not produce public summary"
          FAILED=true
        fi
        if [[ "$FAILED" == "true" ]]; then
          exit 1
        fi

    - name: Install uv
      uses: astral-sh/setup-uv@v6

    - name: Dispatch to channels
      shell: bash
      env:
        CHANNELS: ${{ inputs.channels }}
        REPO: ${{ github.repository }}
        COMMITS: ${{ steps.range.outputs.commit_count }}
        FILES: ${{ steps.range.outputs.files_changed }}
      run: uv run --with telegramify-markdown --with tweepy python3 ${{ github.action_path }}/dispatch.py

