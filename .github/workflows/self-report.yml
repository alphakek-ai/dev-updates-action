name: Self Report

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - uses: ./  # use itself
        with:
          channels: |
            - name: dev-updates-action-releases
              type: telegram
              chat_id: "-1002852734125"
              thread_id: 4
              mode: private
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
